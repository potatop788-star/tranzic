<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OnlyCash - Транзакции</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">
            <div class ="image_logo">
                <img src="./img/Group 17.png" height="60" width="350">
            </div>
        </div>
        <nav>
            <a href="./page2.html">Главная</a>
            <a href="./page3.html">Транзакции</a>
            <a href="./page4.html">Аналитика</a>
            <a href="./page1.html">Вход</a>
        </nav>
    </header>

    <div class="main-content">
        <div class="controls">
            <div class="sidebar-filters">
                <button class="filter-btn active">Все</button>
                <button class="filter-btn">Доходы</button>
                <button class="filter-btn">Расходы</button>
            </div>

            <div class="search-bar">
                <input type="text" placeholder="Поиск">
                <span class="filter-icon">Ф</span>
            </div>
        </div>

        <div class="transaction-list">
            <div class="transaction">
                <div class="transaction-info">
                    <h4>Такси</h4>
                    <p>Транспорт 2026-04-26</p>
                </div>
                <div class="transaction-amount negative">-570 ₽</div>
            </div>

            <div class="transaction">
                <div class="transaction-info">
                    <h4>Фриланс</h4>
                    <p>Дизайн 2026-04-26</p>
                </div>
                <div class="transaction-amount positive">+15 000 ₽</div>
            </div>

            <div class="transaction">
                <div class="transaction-info">
                    <h4>Кино</h4>
                    <p>Развлечения 2026-04-26</p>
                </div>
                <div class="transaction-amount negative">-1 250 ₽</div>
            </div>

            <div class="transaction">
                <div class="transaction-info">
                    <h4>Зарплата</h4>
                    <p>Доход 2026-04-26</p>
                </div>
                <div class="transaction-amount positive">+48 000 ₽</div>
            </div>

            <div class="transaction">
                <div class="transaction-info">
                    <h4>Продукты</h4>
                    <p>Еда 2026-04-26</p>
                </div>
                <div class="transaction-amount negative">-2 450 ₽</div>
            </div>
        </div>

        <button class="add-btn">
            Добавить транзакцию <span style="font-size:20px;">+</span>
        </button>
    </div>
    <footer>
        <nav>
            <a href="page2.html">Главная</a>                                  
            <a href="page3.html">Транзакции</a>
            <a href="page4.html">Аналитика</a>
        </nav>
    </footer>
</body>
</html>
